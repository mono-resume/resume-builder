<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>monobank — Конструктор резюме</title>
<meta name="theme-color" content="#0a0612">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root {
    --bg: #0a0612;
    --surface: rgba(255,255,255,0.03);
    --surface-2: rgba(255,255,255,0.05);
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(255,255,255,0.18);
    --text: #ffffff;
    --text-muted: #9999b0;
    --accent: #ff6b81;
    --accent-2: #c66dff;
    --glow: rgba(198, 109, 255, 0.45);
    --error: #ff6b81;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  *:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; border-radius: 8px; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background-color: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    position: relative;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 800px 600px at 80% 10%, rgba(255,107,129,0.18), transparent 60%),
      radial-gradient(ellipse 700px 500px at 10% 50%, rgba(198,109,255,0.15), transparent 60%);
    pointer-events: none;
    z-index: -1;
  }

  .container {
    width: 100%;
    max-width: 880px;
    margin: 0 auto;
    padding: 28px 20px 80px;
    position: relative;
  }

  .progress-container {
    background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.015));
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 16px 22px;
    margin-bottom: 24px;
  }
  .progress-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    gap: 12px;
  }
  .level-badge {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #fff;
    padding: 5px 14px;
    border-radius: 100px;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.3px;
    white-space: nowrap;
  }
  .xp-text { color: var(--accent); font-weight: 700; font-size: 13px; white-space: nowrap; }
  .progress-bar {
    background: rgba(255,255,255,0.06);
    height: 8px;
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    width: 0%;
    transition: width 0.6s ease;
    box-shadow: 0 0 12px rgba(255, 107, 129, 0.5);
  }

  .achievements {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 14px;
    justify-content: center;
  }
  .achievement {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    transition: all 0.4s;
  }
  .achievement.earned {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    border-color: var(--accent);
    transform: scale(1.08);
    box-shadow: 0 0 12px rgba(255, 107, 129, 0.5);
  }

  .quest-card {
    position: relative;
    background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.015) 100%);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 38px 32px;
    overflow: hidden;
    animation: slideIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  .quest-card::before {
    content: '';
    position: absolute;
    bottom: -50%;
    left: 50%;
    transform: translateX(-50%);
    width: 70%;
    height: 70%;
    background: var(--glow);
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.35;
    pointer-events: none;
    z-index: 0;
  }
  .quest-card > * { position: relative; z-index: 1; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .quest-icon { font-size: 48px; text-align: center; margin-bottom: 14px; }
  .quest-number {
    color: var(--accent);
    font-size: 11px;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 2.5px;
    font-weight: 700;
    margin-bottom: 10px;
  }
  .quest-question {
    font-size: 22px;
    text-align: center;
    margin-bottom: 8px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .quest-hint {
    color: var(--text-muted);
    text-align: center;
    font-size: 14px;
    margin-bottom: 26px;
  }

  .input-field, .textarea-field {
    width: 100%;
    padding: 14px 18px;
    background: rgba(0,0,0,0.35);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-size: 15px;
    font-family: inherit;
    transition: all 0.3s;
  }
  .input-field:focus, .textarea-field:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(255,107,129,0.15);
  }
  .textarea-field { min-height: 120px; resize: vertical; }

  .dob-row {
    display: grid;
    grid-template-columns: 1fr 1.6fr 1fr;
    gap: 12px;
    margin-bottom: 14px;
  }
  .dob-select {
    width: 100%;
    padding: 14px 14px;
    background: rgba(0,0,0,0.35);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-size: 15px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.3s;
    appearance: none;
    -webkit-appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='%23ff6b81' d='M6 8L0 0h12z'/></svg>");
    background-repeat: no-repeat;
    background-position: right 14px center;
    padding-right: 36px;
  }
  .dob-select:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(255,107,129,0.15);
  }
  .dob-select option { background: #14091f; color: var(--text); }
  .age-display {
    text-align: center;
    margin-top: 10px;
    padding: 12px;
    background: rgba(255, 107, 129, 0.08);
    border: 1px solid rgba(255, 107, 129, 0.22);
    border-radius: 12px;
    color: var(--accent);
    font-size: 14px;
    font-weight: 600;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .age-display.empty {
    color: var(--text-muted);
    background: rgba(255,255,255,0.03);
    border-color: var(--border);
    font-weight: 400;
  }

  .field-label {
    display: block;
    color: var(--accent);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 7px;
    font-weight: 700;
  }
  .field-group { margin-bottom: 14px; }

  .choice-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
    gap: 12px;
    margin-bottom: 10px;
  }
  .choice-btn {
    padding: 18px 16px;
    background: rgba(0,0,0,0.35);
    border: 1px solid var(--border);
    border-radius: 14px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
    text-align: center;
    font-weight: 500;
    line-height: 1.35;
  }
  .choice-btn:hover {
    border-color: var(--border-hover);
    background: rgba(255,255,255,0.05);
    transform: translateY(-2px);
  }
  .choice-btn.selected {
    border-color: var(--accent);
    background: linear-gradient(135deg, rgba(255,107,129,0.18), rgba(198,109,255,0.10));
    color: #fff;
    box-shadow: 0 6px 20px rgba(255, 107, 129, 0.25);
    font-weight: 600;
  }
  .choice-icon {
    display: block;
    font-size: 26px;
    margin-bottom: 8px;
  }

  .skip-btn {
    width: 100%;
    background: transparent;
    border: 1px dashed var(--border-hover);
    color: var(--text-muted);
    padding: 14px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 14px;
    font-family: inherit;
    transition: all 0.3s;
    margin-top: 14px;
    font-weight: 500;
  }
  .skip-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(255, 107, 129, 0.05);
  }
  .skip-btn.active {
    border-style: solid;
    border-color: var(--accent);
    background: rgba(255, 107, 129, 0.10);
    color: var(--accent);
  }

  .entry-block {
    background: rgba(0,0,0,0.25);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px;
    margin-bottom: 14px;
    position: relative;
  }
  .entry-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .entry-title {
    color: var(--accent);
    font-weight: 700;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1.8px;
  }
  .remove-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 100px;
    padding: 5px 12px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .remove-btn:hover {
    border-color: var(--error);
    color: var(--error);
  }
  .add-entry-btn {
    width: 100%;
    background: transparent;
    border: 1px dashed var(--border-hover);
    color: var(--text-muted);
    padding: 14px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 14px;
    font-family: inherit;
    transition: all 0.3s;
    margin-bottom: 12px;
    font-weight: 500;
  }
  .add-entry-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(255, 107, 129, 0.05);
  }

  .btn-row {
    display: flex;
    gap: 12px;
    margin-top: 26px;
    flex-wrap: wrap;
  }
  .btn {
    flex: 1;
    padding: 14px 22px;
    border: none;
    border-radius: 100px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
    font-family: inherit;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    min-width: 140px;
  }
  .btn-primary {
    position: relative;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #fff;
    box-shadow: 0 6px 18px rgba(255,107,129,0.22);
    overflow: hidden;
    isolation: isolate;
  }
  .btn-primary::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.35) 50%, transparent 70%);
    transform: translateX(-100%);
    transition: transform 0.7s cubic-bezier(0.2, 0.8, 0.2, 1);
    z-index: -1;
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 28px rgba(255,107,129,0.4);
  }
  .btn-primary:hover::before { transform: translateX(100%); }
  .btn-secondary {
    background: rgba(255,255,255,0.05);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover {
    border-color: var(--border-hover);
    background: rgba(255,255,255,0.08);
  }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

  .final-screen { text-align: center; padding: 10px 0; }
  .victory-icon { font-size: 70px; margin-bottom: 4px; }
  .victory-title {
    font-size: clamp(28px, 4.5vw, 40px);
    font-weight: 800;
    background: linear-gradient(120deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin: 14px 0 8px;
    letter-spacing: -0.02em;
  }
  .victory-sub {
    color: var(--text-muted);
    margin-bottom: 4px;
    font-size: 15px;
  }
  .victory-hint {
    color: var(--text-muted);
    font-size: 13px;
    margin-bottom: 14px;
    opacity: 0.75;
  }

  .error-msg {
    color: var(--error);
    font-size: 13px;
    margin-top: 10px;
    text-align: center;
    min-height: 18px;
    font-weight: 500;
  }

  /* === RESUME CARD === */
  .resume-card {
    background: #ffffff;
    color: #222;
    border-radius: 14px;
    padding: 50px 55px;
    margin: 24px auto;
    max-width: 800px;
    text-align: left;
    font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
    position: relative;
    box-shadow: 0 14px 50px rgba(0,0,0,0.5);
    overflow: hidden;
  }
  .resume-watermark {
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    transform: rotate(-30deg);
    pointer-events: none;
    user-select: none;
    z-index: 0;
    overflow: hidden;
    line-height: 1.8;
  }
  .resume-watermark .wm-row {
    display: block;
    white-space: nowrap;
    font-size: 32px;
    font-weight: 900;
    color: rgba(198, 109, 255, 0.05);
    letter-spacing: 4px;
  }
  .resume-watermark .wm-row.alt {
    color: rgba(255, 107, 129, 0.05);
    padding-left: 80px;
  }
  .resume-content { position: relative; z-index: 1; }

  .resume-top {
    display: flex;
    gap: 24px;
    align-items: flex-start;
    border-bottom: 3px solid;
    border-image: linear-gradient(90deg, #ff6b81, #c66dff) 1;
    padding-bottom: 22px;
    margin-bottom: 24px;
  }
  .resume-photo {
    flex-shrink: 0;
    width: 110px;
    height: 110px;
    border-radius: 14px;
    object-fit: cover;
    border: 3px solid #c66dff;
    background: #f5f5f5;
  }
  .resume-header-text { flex: 1; min-width: 0; }
  .resume-name {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -0.025em;
    color: #1a1a1a;
    margin-bottom: 8px;
    line-height: 1.1;
    word-break: break-word;
  }
  .resume-position-line {
    display: inline-block;
    max-width: 100%;
    font-size: 14px;
    color: #fff;
    background: linear-gradient(120deg, #ff6b81, #c66dff);
    font-weight: 700;
    padding: 6px 14px;
    border-radius: 100px;
    margin-bottom: 14px;
    line-height: 1.35;
    word-break: break-word;
  }
  .resume-contacts {
    display: flex;
    flex-wrap: wrap;
    gap: 10px 18px;
    font-size: 13px;
    color: #555;
  }
  .resume-contacts span {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    word-break: break-word;
  }

  .resume-section { margin-bottom: 22px; }
  .resume-section-title {
    font-size: 13px;
    font-weight: 800;
    color: #c66dff;
    text-transform: uppercase;
    letter-spacing: 1.8px;
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid #eee;
  }

  .resume-exp-item, .resume-edu-item { margin-bottom: 14px; }
  .resume-exp-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 4px;
  }
  .resume-exp-position {
    font-size: 16px;
    font-weight: 700;
    color: #1a1a1a;
    letter-spacing: -0.01em;
  }
  .resume-exp-years {
    font-size: 12px;
    color: #888;
    font-style: italic;
  }
  .resume-exp-company {
    font-size: 13px;
    color: #555;
    margin-bottom: 6px;
    font-weight: 600;
  }
  .resume-exp-duties {
    font-size: 13px;
    color: #444;
    line-height: 1.55;
    white-space: pre-wrap;
    padding-left: 14px;
    border-left: 2px solid #c66dff;
  }

  .resume-equipment-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    font-size: 13px;
  }
  .resume-eq-row { display: flex; gap: 8px; }
  .resume-eq-label { color: #888; font-weight: 600; min-width: 130px; }
  .resume-eq-value { color: #222; }

  .resume-text-block {
    font-size: 13px;
    color: #333;
    line-height: 1.6;
    white-space: pre-wrap;
  }

  .resume-empty-note {
    font-size: 13px;
    color: #999;
    font-style: italic;
  }

  .resume-footer {
    margin-top: 28px;
    padding-top: 14px;
    border-top: 1px solid #eee;
    text-align: center;
    font-size: 11px;
    color: #999;
    font-style: italic;
  }

  /* Modal */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(10, 6, 18, 0.85);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    animation: fadeIn 0.3s ease;
    padding: 20px;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal-box {
    position: relative;
    background: linear-gradient(180deg, #1a0f2e 0%, #0d0918 100%);
    border: 1px solid var(--border-hover);
    border-radius: 24px;
    padding: 40px 32px;
    max-width: 480px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(198, 109, 255, 0.3);
    animation: slideIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
    overflow: hidden;
  }
  .modal-box::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 300px 80px at 50% 0%, rgba(255,107,129,0.18), transparent 70%),
      radial-gradient(ellipse 300px 80px at 50% 100%, rgba(198,109,255,0.12), transparent 70%);
    pointer-events: none;
  }
  .modal-box > * { position: relative; }

  .modal-icon { font-size: 60px; margin-bottom: 12px; }
  .modal-title {
    font-size: 24px;
    font-weight: 800;
    background: linear-gradient(120deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 14px;
    letter-spacing: -0.02em;
  }
  .modal-text {
    color: var(--text-muted);
    font-size: 15px;
    line-height: 1.6;
    margin-bottom: 24px;
  }
  .modal-text b { color: var(--text); font-weight: 600; }

  /* Photo step */
  .photo-preview {
    width: 200px; height: 200px;
    border-radius: 18px;
    margin: 0 auto 16px;
    background: rgba(0,0,0,0.35);
    border: 1px solid var(--border);
    overflow: hidden;
    position: relative;
  }
  .photo-preview img {
    width: 100%; height: 100%; object-fit: cover;
  }
  .photo-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    font-size: 60px;
    opacity: 0.4;
  }
  #cameraVideo {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }

  @media (max-width: 700px) {
    .quest-card { padding: 28px 20px; }
    .quest-question { font-size: 18px; }
    .btn-row { flex-direction: column; }
    .btn { width: 100%; }
    .resume-card { padding: 28px 22px; }
    .resume-name { font-size: 24px; }
    .resume-equipment-grid { grid-template-columns: 1fr; }
    .resume-watermark .wm-row { font-size: 22px; }
    .resume-top { flex-direction: column; align-items: center; text-align: center; }
    .resume-contacts { justify-content: center; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="progress-container" id="progressContainer">
    <div class="progress-info">
      <span class="level-badge" id="levelBadge">Рівень 1</span>
      <span class="xp-text" id="xpText">0 / 0 XP</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="achievements" id="achievements"></div>
  </div>

  <div id="questContainer"></div>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================

function rebuildAchievements() {
  const el = document.getElementById('achievements');
  el.innerHTML = '';
  stepConfig.forEach((q, i) => {
    const a = document.createElement('div');
    a.className = 'achievement' + (i < currentStep ? ' earned' : '');
    a.id = 'ach-' + i;
    a.textContent = q.icon;
    el.appendChild(a);
  });
}

function updateProgress() {
  const total = stepConfig.length;
  const percent = (currentStep / total) * 100;
  document.getElementById('progressFill').style.width = percent + '%';
  document.getElementById('xpText').textContent = currentStep + ' / ' + total + ' XP';
  const level = Math.min(Math.floor(currentStep / Math.ceil(total / 4)) + 1, 4);
  const titles = ['Новачок', 'Дослідник', 'Експерт', 'Майстер'];
  document.getElementById('levelBadge').textContent = titles[level - 1] + ' • Рівень ' + level;
  rebuildAchievements();
}

function escapeHtml(s) {
  return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderQuestion() {
  stepConfig = buildSteps();
  if (currentStep >= stepConfig.length) {
    renderFinal();
    return;
  }
  const cfg = stepConfig[currentStep];
  const container = document.getElementById('questContainer');
  let body = '';

  if (cfg.type === 'experience') body = renderExperienceFields();
  else if (cfg.type === 'education') body = renderEducationFields();
  else if (cfg.type === 'choice') body = renderChoiceFields(cfg);
  else if (cfg.type === 'dob') body = renderDobFields();
  else if (cfg.type === 'photo') body = renderPhotoFields();
  else if (cfg.type === 'textarea') {
    body = `<textarea class="textarea-field" id="answerField" placeholder="${cfg.placeholder || ''}">${escapeHtml(data[cfg.id])}</textarea>`;
  } else {
    const conf = {
      fullName: { type: 'text', placeholder: 'Іваненко Іван Іванович' },
      phone: { type: 'tel', placeholder: '+380XXXXXXXXX' },
      telegram: { type: 'text', placeholder: '@username або https://t.me/...' },
      email: { type: 'email', placeholder: 'name@example.com' },
      city: { type: 'text', placeholder: 'Київ' }
    }[cfg.id];
    body = `<input type="${conf.type}" class="input-field" id="answerField" placeholder="${conf.placeholder}" value="${escapeHtml(data[cfg.id])}">`;
  }

  const isLast = currentStep === stepConfig.length - 1;
  container.innerHTML = `
    <div class="quest-card">
      <div class="quest-icon">${cfg.icon}</div>
      <div class="quest-number">Квест ${currentStep + 1} з ${stepConfig.length}</div>
      <div class="quest-question">${cfg.title}</div>
      <div class="quest-hint">${cfg.hint}</div>
      <div id="fieldArea">${body}</div>
      <div class="error-msg" id="errorMsg"></div>
      <div class="btn-row">
        ${currentStep > 0 ? '<button class="btn btn-secondary" onclick="prevStep()">← Назад</button>' : ''}
        <button class="btn btn-primary" onclick="nextStep()">${isLast ? '🏆 Завершити' : 'Далі →'}</button>
      </div>
    </div>
  `;

  const focusEl = document.getElementById('answerField');
  if (focusEl) focusEl.focus();
  if (focusEl && focusEl.tagName === 'INPUT') {
    focusEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); nextStep(); }
    });
  }
  if (cfg.type === 'dob') updateAgeDisplay();
  updateProgress();
}

function renderChoiceFields(cfg) {
  const current = data[cfg.id];
  const selected = cfg.single
    ? (current ? [current] : [])
    : (current ? current.split(', ').filter(Boolean) : []);
  let html = '<div class="choice-grid">';
  cfg.options.forEach(opt => {
    const isSel = selected.includes(opt.value);
    html += `
      <button type="button" class="choice-btn${isSel ? ' selected' : ''}"
              data-choice="${escapeHtml(opt.value)}"
              onclick="toggleChoice(this, '${cfg.id}', ${cfg.single}, ${cfg.exclusive ? `'${escapeHtml(cfg.exclusive)}'` : 'null'})">
        <span class="choice-icon">${opt.icon}</span>
        ${escapeHtml(opt.label)}
      </button>
    `;
  });
  html += '</div>';
  return html;
}

function toggleChoice(btn, fieldId, single, exclusive) {
  const value = btn.getAttribute('data-choice');
  if (single) {
    document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    data[fieldId] = value;
  } else {
    const isExclusive = exclusive && value === exclusive;
    if (isExclusive) {
      const willBeSelected = !btn.classList.contains('selected');
      document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
      if (willBeSelected) btn.classList.add('selected');
    } else {
      btn.classList.toggle('selected');
      if (exclusive) {
        document.querySelectorAll('.choice-btn').forEach(b => {
          if (b.getAttribute('data-choice') === exclusive) b.classList.remove('selected');
        });
      }
    }
    const selected = [];
    document.querySelectorAll('.choice-btn.selected').forEach(b => {
      selected.push(b.getAttribute('data-choice'));
    });
    data[fieldId] = selected.join(', ');
  }
  document.getElementById('errorMsg').textContent = '';
}

const MONTHS_UK = ['січня','лютого','березня','квітня','травня','червня','липня','серпня','вересня','жовтня','листопада','грудня'];

function renderDobFields() {
  const currentYear = new Date().getFullYear();
  const minYear = currentYear - 100;
  const maxYear = currentYear - 14;

  let dayOpts = '<option value="">День</option>';
  for (let d = 1; d <= 31; d++) dayOpts += `<option value="${d}"${data.dobDay == d ? ' selected' : ''}>${d}</option>`;
  let monthOpts = '<option value="">Місяць</option>';
  MONTHS_UK.forEach((m, i) => {
    const v = i + 1;
    monthOpts += `<option value="${v}"${data.dobMonth == v ? ' selected' : ''}>${m}</option>`;
  });
  let yearOpts = '<option value="">Рік</option>';
  for (let y = maxYear; y >= minYear; y--) yearOpts += `<option value="${y}"${data.dobYear == y ? ' selected' : ''}>${y}</option>`;

  return `
    <div class="dob-row">
      <select class="dob-select" id="dobDay" onchange="updateAgeDisplay()">${dayOpts}</select>
      <select class="dob-select" id="dobMonth" onchange="updateAgeDisplay()">${monthOpts}</select>
      <select class="dob-select" id="dobYear" onchange="updateAgeDisplay()">${yearOpts}</select>
    </div>
    <div class="age-display empty" id="ageDisplay">Обери дату — ми порахуємо твій вік</div>
  `;
}

function calculateAge(day, month, year) {
  if (!day || !month || !year) return null;
  const today = new Date();
  const dob = new Date(year, month - 1, day);
  if (dob.getDate() != day || dob.getMonth() != month - 1) return null;
  let age = today.getFullYear() - year;
  const m = today.getMonth() - (month - 1);
  if (m < 0 || (m === 0 && today.getDate() < day)) age--;
  return age;
}
function ageWord(n) {
  const mod10 = n % 10, mod100 = n % 100;
  if (mod10 === 1 && mod100 !== 11) return 'рік';
  if (mod10 >= 2 && mod10 <= 4 && (mod100 < 10 || mod100 >= 20)) return 'роки';
  return 'років';
}
function updateAgeDisplay() {
  const d = document.getElementById('dobDay').value;
  const m = document.getElementById('dobMonth').value;
  const y = document.getElementById('dobYear').value;
  data.dobDay = d; data.dobMonth = m; data.dobYear = y;
  const display = document.getElementById('ageDisplay');
  const age = calculateAge(d, m, y);
  if (age !== null && age >= 14 && age <= 100) {
    display.classList.remove('empty');
    display.textContent = `🎉 Тобі ${age} ${ageWord(age)}`;
  } else if (d && m && y) {
    display.classList.remove('empty');
    display.textContent = '⚠️ Перевір правильність дати';
  } else {
    display.classList.add('empty');
    display.textContent = 'Обери дату — ми порахуємо твій вік';
  }
  document.getElementById('errorMsg').textContent = '';
}

function buildWatermark() {
  const word = 'monobank';
  const perRow = 14, rows = 26;
  let html = '';
  for (let r = 0; r < rows; r++) {
    const cls = r % 2 === 0 ? 'wm-row' : 'wm-row alt';
    html += `<span class="${cls}">${(word + ' ').repeat(perRow)}</span>`;
  }
  return html;
}

function collectExperience() {
  document.querySelectorAll('[data-exp]').forEach(el => {
    const idx = parseInt(el.getAttribute('data-exp'));
    const f = el.getAttribute('data-field');
    if (data.experience[idx]) data.experience[idx][f] = el.value;
  });
}
function collectEducation() {
  document.querySelectorAll('[data-edu]').forEach(el => {
    const idx = parseInt(el.getAttribute('data-edu'));
    const f = el.getAttribute('data-field');
    if (data.education[idx]) data.education[idx][f] = el.value;
  });
}
function addExp() { collectExperience(); data.experience.push({ company: '', position: '', years: '', duties: '' }); document.getElementById('fieldArea').innerHTML = renderExperienceFields(); }
function removeExp(idx) { collectExperience(); data.experience.splice(idx, 1); document.getElementById('fieldArea').innerHTML = renderExperienceFields(); }

    : `<div class="photo-empty">📷</div>`;
  return `
    <div class="photo-preview" id="photoPreview">${previewInner}</div>
    <div class="choice-grid">
      <button type="button" class="choice-btn" onclick="openCamera()">
        <span class="choice-icon">📸</span>
        Зробити фото
      </button>
      <button type="button" class="choice-btn" onclick="document.getElementById('photoFile').click()">
        <span class="choice-icon">🖼️</span>
        З галереї
      </button>
      ${data.photo ? `<button type="button" class="choice-btn" onclick="clearPhoto()"><span class="choice-icon">🗑️</span>Прибрати</button>` : ''}
    </div>
    <input type="file" id="photoFile" accept="image/*" style="display:none" onchange="onPhotoFile(event)">
    <p style="text-align:center; color: var(--text-muted); font-size: 13px; margin-top: 12px;">
      Фото — за бажанням. Можна пропустити та натиснути «Завершити».
    </p>
  `;
}

function clearPhoto() {
  data.photo = '';
  stopCamera();
  document.getElementById('fieldArea').innerHTML = renderPhotoFields();
}

function onPhotoFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (!file.type.startsWith('image/')) {
    document.getElementById('errorMsg').textContent = 'Це не зображення';
    return;
  }
  const reader = new FileReader();
  reader.onload = (ev) => {
    resizeImage(ev.target.result, 600, (resized) => {
      data.photo = resized;
      document.getElementById('fieldArea').innerHTML = renderPhotoFields();
    });
  };
  reader.readAsDataURL(file);
}

function resizeImage(dataUrl, maxSize, cb) {
  const img = new Image();
  img.onload = () => {
    let w = img.width, h = img.height;
    if (w > h && w > maxSize) { h = h * maxSize / w; w = maxSize; }
    else if (h > maxSize) { w = w * maxSize / h; h = maxSize; }
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
    cb(canvas.toDataURL('image/jpeg', 0.85));
  };
  img.src = dataUrl;
}

async function openCamera() {
  try {
    stopCamera();
    cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
    const preview = document.getElementById('photoPreview');
    preview.innerHTML = `<video id="cameraVideo" autoplay playsinline></video>`;
    const video = document.getElementById('cameraVideo');
    video.srcObject = cameraStream;
    const grid = preview.parentElement.querySelector('.choice-grid');
    grid.innerHTML = `
      <button type="button" class="choice-btn" onclick="snapPhoto()"><span class="choice-icon">⚡</span>Зняти</button>
      <button type="button" class="choice-btn" onclick="cancelCamera()"><span class="choice-icon">✖️</span>Скасувати</button>
    `;
  } catch (e) {
    document.getElementById('errorMsg').textContent = 'Не вдалося отримати доступ до камери';
  }
}
function snapPhoto() {
  const video = document.getElementById('cameraVideo');
  if (!video) return;
  const canvas = document.createElement('canvas');
  const size = Math.min(video.videoWidth, video.videoHeight);
  canvas.width = 600; canvas.height = 600;
  const sx = (video.videoWidth - size) / 2;
  const sy = (video.videoHeight - size) / 2;
  canvas.getContext('2d').drawImage(video, sx, sy, size, size, 0, 0, 600, 600);
  data.photo = canvas.toDataURL('image/jpeg', 0.85);
  stopCamera();
  document.getElementById('fieldArea').innerHTML = renderPhotoFields();
}
function cancelCamera() {
  stopCamera();
  document.getElementById('fieldArea').innerHTML = renderPhotoFields();
}
function stopCamera() {
  if (cameraStream) {
    cameraStream.getTracks().forEach(t => t.stop());
    cameraStream = null;
  }
}

// ============================================================
// VALIDATION
// ============================================================
function validateStep() {
  const cfg = stepConfig[currentStep];
  const id = cfg.id;
  if (cfg.type === 'experience') {
    if (data.noExperience) return null;
    collectExperience();
    for (const e of data.experience) {
      if (!e.company.trim() || !e.position.trim() || !e.years.trim())
        return 'Заповни всі поля для кожного місця роботи або обери «Немає досвіду»';
    }
    return null;
  }
  if (cfg.type === 'education') {
    if (data.noEducation) return null;
    collectEducation();
    for (const e of data.education) {
      if (!e.institution.trim() || !e.specialty.trim() || !e.years.trim())
        return 'Заповни всі поля для кожної освіти або обери «Немає освіти»';
    }
    return null;
  }
  if (cfg.type === 'choice') {
    if (!data[id] || !data[id].trim()) return 'Обери хоча б один варіант';
    return null;
  }
  if (cfg.type === 'dob') {
    if (!data.dobDay || !data.dobMonth || !data.dobYear) return 'Обери день, місяць і рік народження';
    const age = calculateAge(data.dobDay, data.dobMonth, data.dobYear);
    if (age === null) return 'Перевір правильність дати';
    if (age < 14 || age > 100) return 'Вік має бути від 14 до 100 років';
    return null;
  }
  if (cfg.type === 'photo') return null;
  if (cfg.type === 'textarea') {
    const field = document.getElementById('answerField');
    const value = field.value.trim();
    if (!value && !cfg.optional && id === 'skills') return 'Розкажи про свої навички';
    data[id] = value;
    return null;
  }
  const field = document.getElementById('answerField');
  const value = field.value.trim();
  if (!value) {
    if (cfg.optional) { data[id] = ''; return null; }
    return 'Це поле обов\'язкове';
  }
  if (id === 'email' && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value)) return 'Невірний формат пошти';
  if (id === 'phone' && !/^[+]?[\d\s\-\(\)]{10,}$/.test(value)) return 'Невірний формат телефону';
  data[id] = value;
  return null;
}

function nextStep() {
  const err = validateStep();
  if (err) { document.getElementById('errorMsg').textContent = err; return; }
  stopCamera();
  currentStep++;
  renderQuestion();
}
function prevStep() {
  const cfg = stepConfig[currentStep];
  if (cfg.type === 'experience') { if (!data.noExperience) collectExperience(); }
  else if (cfg.type === 'education') { if (!data.noEducation) collectEducation(); }
  else if (cfg.type === 'textarea') {
    const f = document.getElementById('answerField');
    if (f) data[cfg.id] = f.value;
  } else if (cfg.type !== 'choice' && cfg.type !== 'dob' && cfg.type !== 'photo') {
    const f = document.getElementById('answerField');
    if (f) data[cfg.id] = f.value;
  }
  stopCamera();
  currentStep--;
  renderQuestion();
}

// ============================================================
// FINAL SCREEN
// ============================================================
function renderFinal() {
  const age = calculateAge(data.dobDay, data.dobMonth, data.dobYear);
  const dobStr = (data.dobDay && data.dobMonth && data.dobYear)
    ? `${data.dobDay} ${MONTHS_UK[parseInt(data.dobMonth) - 1]} ${data.dobYear} р.`
    : '';
  const ageStr = age !== null ? `${age} ${ageWord(age)}` : '';

  updateProgress();

  const expHtml = data.noExperience
    ? `<div class="resume-empty-note">Без досвіду роботи</div>`
    : data.experience.map(e => `
      <div class="resume-exp-item">
        <div class="resume-exp-head">
          <div class="resume-exp-position">${escapeHtml(e.position)}</div>
          <div class="resume-exp-years">${escapeHtml(e.years)}</div>
        </div>
        <div class="resume-exp-company">${escapeHtml(e.company)}</div>
        ${e.duties && e.duties.trim() ? `<div class="resume-exp-duties">${escapeHtml(e.duties)}</div>` : ''}
      </div>
    `).join('');

  const eduHtml = data.noEducation
    ? `<div class="resume-empty-note">Без вищої освіти</div>`
    : data.education.map(e => `
      <div class="resume-edu-item">
        <div class="resume-exp-head">
          <div class="resume-exp-position">${escapeHtml(e.institution)}</div>
          <div class="resume-exp-years">${escapeHtml(e.years)}</div>
        </div>
        <div class="resume-exp-company">${escapeHtml(e.specialty)}</div>
      </div>
    `).join('');

  const photoHtml = data.photo
    ? `<img class="resume-photo" src="${data.photo}" alt="">`
    : '';

  const englishRowHtml = data.englishLevel
    ? `<div class="resume-section">
         <div class="resume-section-title">Рівень англійської</div>
         <div class="resume-text-block">${escapeHtml(data.englishLevel)}</div>
       </div>`
    : '';

  const powerStr = data.power + (data.powerHours ? ` (${data.powerHours})` : '');

  const contactsHtml = [
    `<span>📱 ${escapeHtml(data.phone)}</span>`,
    data.telegram ? `<span>✈️ ${escapeHtml(data.telegram)}</span>` : '',
    `<span>📧 ${escapeHtml(data.email)}</span>`,
    `<span>📍 ${escapeHtml(data.city)}</span>`,
    `<span>🎂 ${escapeHtml(dobStr)}${ageStr ? ' (' + escapeHtml(ageStr) + ')' : ''}</span>`
  ].filter(Boolean).join('');

  const container = document.getElementById('questContainer');
  container.innerHTML = `
    <div class="quest-card final-screen">
      <div class="victory-icon">🏆</div>
      <div class="victory-title">ВІТАЄМО!</div>
      <p class="victory-sub">Твоє резюме готове</p>
      <p class="victory-hint">Завантажуй PDF та відправляй відгук</p>

      <div class="resume-card" id="resumeCard">
        <div class="resume-watermark">${buildWatermark()}</div>
        <div class="resume-content">
          <div class="resume-top">
            ${photoHtml}
            <div class="resume-header-text">
              <div class="resume-name">${escapeHtml(data.fullName)}</div>
              <div class="resume-position-line">${escapeHtml(data.vacancy)}</div>
              <div class="resume-contacts">${contactsHtml}</div>
            </div>
          </div>

          <div class="resume-section">
            <div class="resume-section-title">Досвід роботи</div>
            ${expHtml}
          </div>

          <div class="resume-section">
            <div class="resume-section-title">Освіта</div>
            ${eduHtml}
          </div>

          ${englishRowHtml}

          <div class="resume-section">
            <div class="resume-section-title">Навички</div>
            <div class="resume-text-block">${escapeHtml(data.skills)}</div>
          </div>

          <div class="resume-section">
            <div class="resume-section-title">Технічне забезпечення</div>
            <div class="resume-equipment-grid">
              <div class="resume-eq-row"><span class="resume-eq-label">Тип ПК:</span><span class="resume-eq-value">${escapeHtml(data.pcType)}</span></div>
              <div class="resume-eq-row"><span class="resume-eq-label">ОС:</span><span class="resume-eq-value">${escapeHtml(data.os)}</span></div>
              <div class="resume-eq-row"><span class="resume-eq-label">Живлення:</span><span class="resume-eq-value">${escapeHtml(powerStr)}</span></div>
              <div class="resume-eq-row"><span class="resume-eq-label">Інтернет:</span><span class="resume-eq-value">${escapeHtml(data.internet)}</span></div>
            </div>
          </div>

          ${data.extra && data.extra.trim() ? `
          <div class="resume-section">
            <div class="resume-section-title">Додаткова інформація</div>
            <div class="resume-text-block">${escapeHtml(data.extra)}</div>
          </div>` : ''}

          <div class="resume-footer">
            Резюме згенеровано з допомогою конструктора резюме від monobank
          </div>
        </div>
      </div>

      <div class="btn-row">
        <button class="btn btn-secondary" onclick="restart()">🔄 Почати знову</button>
        <button class="btn btn-primary" onclick="downloadPDF()">📥 Завантажити PDF</button>
        <button class="btn btn-primary" id="sendBtn" onclick="sendApplication()">📨 Відправити відгук</button>
      </div>
    </div>
  `;
}

function restart() {
  Object.assign(data, {
    source: '',
    vacancy: '', fullName: '', dobDay: '', dobMonth: '', dobYear: '',
    phone: '', telegram: '', email: '', city: '', englishLevel: '',
    experience: [{ company: '', position: '', years: '', duties: '' }], noExperience: false,
    education: [{ institution: '', specialty: '', years: '' }], noEducation: false,
    skills: '', pcType: '', os: '', power: '', powerHours: '', internet: '', extra: '', photo: ''
  });
  currentStep = 0;
  renderQuestion();
}

// ============================================================
// PDF
// ============================================================
async function downloadPDF() {
  const btn = event.target;
  const original = btn.textContent;
  btn.textContent = '⏳ Генерація...';
  btn.disabled = true;
  try {
    const element = document.getElementById('resumeCard');
    const canvas = await html2canvas(element, { scale: 2, backgroundColor: '#ffffff', useCORS: true });
    const imgData = canvas.toDataURL('image/png');
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('p', 'mm', 'a4');
    const pdfWidth = pdf.internal.pageSize.getWidth();
    const pdfHeight = pdf.internal.pageSize.getHeight();
    const imgWidth = pdfWidth;
    const imgHeight = (canvas.height * imgWidth) / canvas.width;
    let heightLeft = imgHeight;
    let position = 0;
    pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
    heightLeft -= pdfHeight;
    while (heightLeft > 0) {
      position = heightLeft - imgHeight;
      pdf.addPage();
      pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
      heightLeft -= pdfHeight;
    }
    const filename = 'Resume_' + (data.fullName.replace(/\s+/g, '_') || 'Candidate') + '.pdf';
    pdf.save(filename);
  } catch (e) {
    alert('Помилка при створенні PDF: ' + e.message);
  } finally {
    btn.textContent = original;
    btn.disabled = false;
  }
}

// ============================================================
// SEND
// ============================================================
function buildPayload() {
  const dobIso = (data.dobDay && data.dobMonth && data.dobYear)
    ? `${String(data.dobDay).padStart(2, '0')}.${String(data.dobMonth).padStart(2, '0')}.${data.dobYear}`
    : '';
  const age = calculateAge(data.dobDay, data.dobMonth, data.dobYear);

  const eduStr = data.noEducation
    ? 'Без вищої освіти'
    : data.education.map(e => `${e.institution} — ${e.specialty} (${e.years})`.trim()).filter(Boolean).join('\n');

  let expStr = data.noExperience
    ? 'Без досвіду роботи'
    : data.experience.map(e => {
        const head = `${e.position} — ${e.company} (${e.years})`.trim();
        return e.duties && e.duties.trim() ? `${head}\n${e.duties.trim()}` : head;
      }).filter(Boolean).join('\n\n');

  if (data.englishLevel) {
    expStr += (expStr ? '\n\n' : '') + `Англійська: ${data.englishLevel}`;
  }

  return {
    token: FORM_TOKEN,
    sheet: 'Фестиваль',
    origin: window.location.origin,
    source: data.source,
    fullName: data.fullName,
    dob: dobIso,
    age: age,
    phone: data.phone,
    telegram: data.telegram,
    email: data.email,
    city: data.city,
    vacancy: data.vacancy,
    experience: expStr,
    education: eduStr,
    skills: data.skills,
    pcType: data.pcType,
    os: data.os,
    power: data.power,
    powerHours: data.powerHours,
    internet: data.internet,
    extra: data.extra,
    englishLevel: data.englishLevel
  };
}

async function sendApplication() {
  const btn = document.getElementById('sendBtn');
  if (!btn) return;
  if (btn.dataset.sent === '1') return;
  const original = btn.textContent;
  btn.disabled = true;

  if (!SCRIPT_URL) {
    btn.textContent = original;
    btn.disabled = false;
    alert('Не налаштований SCRIPT_URL');
    return;
  }

  const form = new URLSearchParams();
  form.append('payload', JSON.stringify(buildPayload()));

  // Експоненційний backoff із джиттером — захищає від штормів запитів
  const attempts = [
    { wait: 0,    label: '⏳ Відправка...' },
    { wait: 1000, label: '⏳ Повтор #1...' },
    { wait: 3000, label: '⏳ Повтор #2...' },
    { wait: 8000, label: '⏳ Повтор #3...' }
  ];

  for (let i = 0; i < attempts.length; i++) {
    const a = attempts[i];
    if (a.wait > 0) {
      const jitter = Math.floor(Math.random() * a.wait * 0.4); // ±20%
      await new Promise(r => setTimeout(r, a.wait + jitter));
    }
    btn.textContent = a.label;
    try {
      const resp = await fetch(SCRIPT_URL, { method: 'POST', body: form });
      const res = await resp.json().catch(() => ({}));
      if (res && (res.status === 'ok' || res.status === 'queued')) {
        btn.dataset.sent = '1';
        btn.textContent = '✅ Відправлено';
        clearPending();
        showSuccessModal();
        return;
      }
      // якщо сервер відповів конкретним помилковим повідомленням — не ретраїмо
      if (res && res.status === 'error' && res.message && /token|sheet|fields/i.test(res.message)) {
        throw new Error(res.message);
      }
      // інакше — ретраїмо
    } catch (e) {
      if (i === attempts.length - 1) {
        savePending(form.toString());
        btn.textContent = original;
        btn.disabled = false;
        alert('Сервер тимчасово недоступний. Дані збережено у браузері — спробуй ще раз через хвилину натиснувши «Відправити відгук».');
        return;
      }
    }
  }
  // після всіх спроб
  savePending(form.toString());
  btn.textContent = original;
  btn.disabled = false;
  alert('Сервер перевантажений. Дані збережено — натисни «Відправити відгук» ще раз через хвилину.');
}

function savePending(formStr) {
  try { localStorage.setItem('mono_pending_resume', formStr); } catch (e) {}
}
function clearPending() {
  try { localStorage.removeItem('mono_pending_resume'); } catch (e) {}
}

function showSuccessModal() {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal-box">
      <div class="modal-icon">✅</div>
      <div class="modal-title">Відгук отримано!</div>
      <div class="modal-text">
        Дякуємо, <b>${escapeHtml(data.fullName.split(' ')[0] || 'кандидате')}</b>!<br><br>
        Твій відгук на вакансію <b>«${escapeHtml(data.vacancy)}»</b> успішно отримано.
      </div>
      <button class="btn btn-primary" onclick="this.closest('.modal-overlay').remove()" style="max-width: 220px; margin: 0 auto;">Зрозуміло</button>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
}

renderQuestion();
</script>
